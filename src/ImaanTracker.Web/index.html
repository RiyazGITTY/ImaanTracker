<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Imaan Tracker</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="brand">
      <p class="eyebrow">Imaan Tracker</p>
      <h1>Track today's five prayers.</h1>
      <p class="subtle">Indeed, prayer prohibits immorality and wrongdoing, and the remembrance of Allah is greater. Quran 29:45</p>
    </section>

    <section id="authPanel" class="panel">
      <div class="tabs" role="tablist">
        <button id="loginTab" class="tab active" type="button">Login</button>
        <button id="signupTab" class="tab" type="button">Sign up</button>
      </div>

      <form id="loginForm" class="form">
        <label>Email<input id="loginEmail" type="email" autocomplete="email" required></label>
        <label>Password
          <span class="password-field">
            <input id="loginPassword" type="password" autocomplete="current-password" required>
            <button class="eye-button" type="button" aria-label="Show password" data-toggle-password="#loginPassword">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </span>
        </label>
        <button class="primary" type="submit">Login</button>
      </form>

      <form id="signupForm" class="form hidden">
        <label>Full name<input id="signupName" autocomplete="name" required></label>
        <label>Email<input id="signupEmail" type="email" autocomplete="email" required></label>
        <label>Mobile number<input id="signupMobile" type="tel" autocomplete="tel" required></label>
        <label>Password
          <span class="password-field">
            <input id="signupPassword" type="password" autocomplete="new-password" required minlength="6">
            <button class="eye-button" type="button" aria-label="Show password" data-toggle-password="#signupPassword">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </span>
        </label>
        <label>Confirm password
          <span class="password-field">
            <input id="signupConfirmPassword" type="password" autocomplete="new-password" required minlength="6">
            <button class="eye-button" type="button" aria-label="Show confirm password" data-toggle-password="#signupConfirmPassword">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </span>
        </label>
        <div class="split">
          <label>City<input id="signupCity" required></label>
          <label>Country<input id="signupCountry" required></label>
        </div>
        <button id="signupButton" class="primary" type="submit">
          <span class="button-text">Create account</span>
          <span class="loader" aria-hidden="true"></span>
        </button>
      </form>

      <p id="authMessage" class="message"></p>
    </section>

    <section id="prayerPanel" class="panel hidden">
      <div class="topbar">
        <div>
          <p class="eyebrow">Today</p>
          <p id="salaamText" class="salaam">Assalamu Alaikum,</p>
          <h2>Prayer checklist</h2>
        </div>
        <button id="logoutButton" class="ghost logout-icon" type="button" aria-label="Logout" title="Logout">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 17l5-5-5-5"/>
            <path d="M15 12H3"/>
            <path d="M21 19V5"/>
          </svg>
        </button>
      </div>

      <div class="progress">
        <div>
          <strong id="statusText">0 of 5 complete</strong>
          <span id="completeText">Keep going.</span>
        </div>
        <div id="progressCircle">0%</div>
      </div>

      <div id="prayerList" class="prayer-list"></div>
      <p id="prayerMessage" class="message"></p>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
